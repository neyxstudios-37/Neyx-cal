<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nec MLC Calculator</title>
<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{text-align:center;padding:20px}
img{max-width:90%;border-radius:15px;margin-bottom:20px;box-shadow:0 0 30px #00ff88}
h1{color:#00ff88;margin-bottom:10px}
p{color:#aaa}
.input-box{margin:20px 0}
input{padding:12px;border-radius:8px;border:2px solid #00ff88;background:#1a1a1a;color:#fff;width:200px;text-align:center;font-size:18px}
button{padding:12px 25px;background:#00ff88;color:#000;border:none;border-radius:8px;font-weight:bold;font-size:16px;margin-top:10px;cursor:pointer}
.result{margin-top:20px;font-size:20px;color:#00ff88}
</style>
</head>
<body>
<div class="container">
<img src="file_00000000d4e871f4b1b23451b1258c17.png" alt="Nec MLC">
<h1>Nec MLC Calculator</h1>
<p>Enter your value below</p>
<div class="input-box">
<input type="number" id="num" placeholder="Enter number">
<br>
<button onclick="calc()">Calculate</button>
</div>
<div class="result" id="result"></div>
</div>
<script>
function calc(){
let n=document.getElementById('num').value;
let res=n*1.5+100;
document.getElementById('result').innerHTML='Result: '+res;
}
</script>
</body>
</html>
